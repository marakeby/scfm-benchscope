run_id: 
dataset:
    - brca_full/pre_post/dataset_h5ad_tcells_only.yaml

classification:
    - brca_full/pre_post/classification_randomforest_pre_post.yaml

    
embedding:
    method: geneformer
    module: features.gf_extractor
    class: GeneformerExtractor
    viz: True
    eval: True
    params: 
        #1- Genefromer 1
        # model: Geneformer-V1-10M 
        # version: V1
        # model_dir: /home/jupyter/MODELS/Geneformer/
        # dict_dir: /home/jupyter/MODELS/Geneformer/geneformer/gene_dictionaries_30m #genefromer 1
        # input_size: 2048
        # batch_size: 8
        
        # 2-Geneformer 1 (LARGE)
#         model: gf-12L-30M-i2048 
#         model_dir: /home/jupyter/Geneformer2/Geneformer
#         dict_dir: /home/jupyter/Geneformer2/dicts1 #genefromer 1
#         input_size: 2048
        
        # 3-Geneformer 2
        # model: Geneformer-V2-104M
        # version: V2
        # model_dir: /home/jupyter/MODELS/Geneformer
        # dict_dir: /home/jupyter/MODELS/Geneformer/geneformer #genefromer 2
        # input_size: 4096

#         # 4-Geneformer 2 (cancer)
        model: Geneformer-V2-104M_CLcancer
        version: V2
        model_dir: /home/jupyter/mnt/MODELS
        dict_dir: /home/jupyter/mnt/gf_dicts_v2 #genefromer 2
        input_size: 4096
        batch_size: 8
        continue_training:
            learning_rate: 0.001
            do_train: True
            do_eval: False
            group_by_length: True
            length_column_name: length
            disable_tqdm: False
            lr_scheduler_type: linear
            warmup_steps: 10000
            weight_decay: 0.001
            per_device_train_batch_size: 8
            num_train_epochs: 6
            save_strategy: 'epoch' #'steps' 

    eval: True