# Option A1 — outcome task (NE vs E on Pre timepoint). Same embedding stack as other A1 samples.

run_id: option_a1_outcome_gf104m

dataset:
  - brca_full/outcome/dataset_shared.yaml

classification:
  - brca_full/outcome/classification_randomforest.yaml

embedding:
  method: geneformer
  module: features.gf_extractor
