# Shared RandomForest classifier for brca_full/pre_post (Pre/Post labels)
classification:
  module: models.classify
  class: ClassifierPipeline
  params:
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
      - avg
      - mil
      - vote
    cv: True
  viz: True
  eval: True
