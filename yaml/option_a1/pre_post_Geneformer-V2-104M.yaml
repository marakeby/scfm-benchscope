# Option A1 — one YAML per task: this file is the full entrypoint for the
# brca_full pre/post (Pre vs Post) task with Geneformer V2 104M embeddings.
# Run from repo root:  python run/run_exp.py option_a1/pre_post_Geneformer-V2-104M.yaml
# Dataset + classifier fragments are shared includes under yaml/brca_full/pre_post/.

run_id: option_a1_pre_post_gf104m

dataset:
  - brca_full/pre_post/dataset_h5ad_tcells_only.yaml

classification:
  - brca_full/pre_post/classification_randomforest_pre_post.yaml

embedding:
  method: geneformer
  module: features.gf_extractor
  class: GeneformerExtractor
  viz: True
  eval: True
  params:
    model: Geneformer-V2-104M
    version: V2
    model_dir: /home/jupyter/mnt/MODELS
    dict_dir: /home/jupyter/mnt/gf_dicts_v2
    input_size: 4096
