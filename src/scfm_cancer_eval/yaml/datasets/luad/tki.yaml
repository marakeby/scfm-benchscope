dataset:
  module: data.data_loader
  class: H5ADLoader
  path: luad_brca/luad/luad_analysis2.h5ad
  load_raw: true
  label_key: group_id
  batch_key: sample_id
  layer_name: X
  train_test_split: data_splits/luad/luad2/train_test_split.json
  cv_splits: data_splits/luad/luad2/cv_splits.json
  label_map:
    treatment_naive: 0
    TKI: 1
    
  #subsample for development purposes only
  # max_cells: 2000
  # max_cells_stratify: donor_id
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
