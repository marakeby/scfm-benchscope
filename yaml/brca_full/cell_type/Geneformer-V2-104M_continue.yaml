run_id: 
dataset:
    - brca_full/cell_type/dataset_shared.yaml

embedding:
    method: geneformer
    module: features.gf_extractor
    class: GeneformerExtractor
    viz: True
    eval: True
    params: 
        # 3-Geneformer 2
        model: Geneformer-V2-104M
        version: V2
        model_dir: /home/jupyter/mnt/MODELS
        dict_dir: /home/jupyter/mnt/gf_dicts_v2 #genefromer 2
        input_size: 4096
        batch_size: 16
        continue_training:
            learning_rate: 0.001
            do_train: True
            do_eval: False
            group_by_length: True
            length_column_name: length
            disable_tqdm: False
            lr_scheduler_type: linear
            warmup_steps: 10000
            weight_decay: 0.001
            per_device_train_batch_size: 16
            num_train_epochs: 6
            save_strategy: 'epoch' #'steps' 



    eval: True