run_id: 'geneformer_V1-10M-i2048_continue_brca_cell_type'
dataset:
  - datasets/brca/cell_type/dataset_full.yaml

preprocessing:
  skip: true
  
hvg:
  flavor: seurat
  layer: counts
  normalize_before_hvg: True
  n_top_genes: 4096
  batch_key: batch
  subset: True
  preserve_counts: true
  
embedding:
  method: geneformer
  module: features.gf_extractor
  class: GeneformerExtractor
  viz: true
  eval: true
  params:
    model: Geneformer-V1-10M
    version: V1
    model_dir: Geneformer
    dict_dir: Geneformer/gf_dicts_v1
    input_size: 2048
    batch_size: 8
    continue_training:
        learning_rate: 0.0001 #0.001
        do_train: True
        do_eval: False
        group_by_length: True
        length_column_name: length
        disable_tqdm: False
        lr_scheduler_type: linear
        warmup_steps: 1000 #10000
        weight_decay: 0.001
        per_device_train_batch_size: 16
        num_train_epochs: 6
        save_strategy: 'epoch' #'steps' 
        
classification:
  skip: True
