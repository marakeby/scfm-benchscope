run_id: 'geneformer_V1-10M-i2048_pancancer_cell_type_counts'

bases:
  - datasets/pancancer/cell_type/dataset_shared.yaml
  - models/geneformer/V1-10M-i2048.yaml

dataset:
  max_cells: 40000
  max_cells_stratify: patient


qc:
  min_genes: 10
  min_cells: 10

  
preprocessing:
  skip: true
  
# hvg:
#   # skip: false
#   # Preserve raw counts that are currently stored in X.
#   preserve_counts: true
#   counts_layer: counts
#   # Compute HVGs from the preserved counts layer.
#   # For counts, `seurat_v3` is the typical choice.
#   layer: counts
#   flavor: seurat_v3
#   n_top_genes: 4096
#   # `seurat_v3` can fail LOESS fits on some batch stratifications.
#   # Start without batch-aware HVGs; re-add `batch_key` only if needed.
#   batch_key: batch
#   # More robust LOESS span (Scanpy parameter for seurat_v3)
#   span: 0.75
#   # Keep all genes in the AnnData, just mark `var['highly_variable']`.
#   # Set to true if you *do* want to subset to HVGs.
#   subset: True

hvg:
  flavor: seurat
  layer: counts
  normalize_before_hvg: True
  n_top_genes: 4096
  batch_key: patient
  subset: True
  preserve_counts: true
  
classification:
  skip: True