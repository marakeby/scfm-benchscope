dataset:
  module: data.data_loader
  class: H5ADLoader
  path: brca_full/cells_only_13gigs.h5ad
  load_raw: false
  label_key: cell_types
  batch_key: donor_id
  filter:
  - column: timepoint
    values:
    - Pre
  layer_name: X
  train_test_split: data_splits/brca_full/brca_cell_type/train_test_split.json
  cv_splits: data_splits/brca_full/brca_cell_type/cv_splits.json
  label_map:
    Pre: 0
    Post: 1
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: scgpt
  module: features.scgpt_extractor
  class: scGPT_Exractor
  viz: true
  eval: true
  params:
    model: scGPT_cancer
    model_dir: scGPT
    batch_size: 16
    n_bins: 51
    max_seq_len: 2048
run_id: scgpt_cancer-i2048_brca_cell_type
classification:
  skip: true
