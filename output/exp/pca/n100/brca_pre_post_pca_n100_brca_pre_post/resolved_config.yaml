dataset:
  module: data.data_loader
  class: H5ADLoader
  path: brca_full/T_cells_only.h5ad
  load_raw: false
  label_key: pre_post
  batch_key: donor_id
  layer_name: X
  train_test_split: data_splits/brca_full/brca_pre_post/train_test_split.json
  cv_splits: data_splits/brca_full/brca_pre_post/cv_splits.json
  label_map:
    Pre: 0
    Post: 1
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: PCA
  module: features.pca_extractor
  class: PCAEmbeddingExtractor
  viz: true
  eval: true
  params:
    n_components: 100
    embedding_col: X_pca
classification:
  module: models.classify
  class: ClassifierPipeline
  params:
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    mil:
      debug: false
      top_k: 20
      holdout_fraction: 0.0
  viz: true
  eval: true
run_id: pca_n100_brca_pre_post
