run_id: 'scimilarity_v1.1_brca_cell_type'
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: brca_full/cells_only_13gigs.h5ad
  load_raw: false
  label_key: cell_types
  batch_key: donor_id
  filter:
  - column: timepoint
    values:
    - Pre
  layer_name: X
  train_test_split: data_splits/brca_full/brca_cell_type/train_test_split.json
  cv_splits: data_splits/brca_full/brca_cell_type/cv_splits.json
  label_map:
    Pre: 0
    Post: 1 
qc:
    # skip: True
    min_genes: 10
    min_cells: 10

preprocessing:
    skip: True

hvg:
    skip: True
    
model:
  - models/scimilarity/v1.1.yaml
classification:
  skip: True

hvg:
  skip: True