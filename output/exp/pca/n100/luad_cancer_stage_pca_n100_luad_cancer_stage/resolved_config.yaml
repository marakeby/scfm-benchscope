dataset:
  module: data.data_loader
  class: H5ADLoader
  path: luad_brca/luad/luad_analysis1.h5ad
  load_raw: true
  label_key: group_id
  batch_key: sample_id
  layer_name: X
  train_test_split: data_splits/luad/luad1/train_test_split.json
  cv_splits: data_splits/luad/luad1/cv_splits.json
  label_map:
    early_stage: 0
    late_stage: 1
qc:
  skip: true
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: true
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  batch_key: null
  n_top_genes: 2048
  flavor: seurat
embedding:
  method: PCA
  module: features.pca_extractor
  class: PCAEmbeddingExtractor
  viz: true
  eval: true
  params:
    n_components: 100
    embedding_col: X_pca
classification:
  module: models.classify
  class: ClassifierPipeline
  params:
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    mil:
      debug: false
      top_k: 20
      holdout_fraction: 0.0
  viz: true
  eval: true
run_id: pca_n100_luad_cancer_stage
